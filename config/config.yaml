scan:
  timeout: 3s
  ports: "21,22,23,25,53,80,110,111,135,139,143,443,445,993,995,1433,1521,2049,3306,3389,5432,5900,6379,8080,8443,9200,9300,27017"
  rate_limit: 200
  workers: 100
  discovery: true
  stats_interval: 5
  udp: false
  udp_ports: "53,123,161,500"
  crawl_depth: 2
  max_targets: 5000
  max_ports_per_target: 5000
  max_duration: 30m
subdomain:
  port_profile: web
  sources: "crtsh,anubis,digitorus,thc,commoncrawl,waybackarchive,rapiddns,hudsonrock,sitedossier,threatcrowd"
  exclude_sources: ""
  all_sources: false
  recursive_only: false
  max_time: 5
  rate_limit: 0
  threads: 10
  provider_config: ""
dns:
  ttl: 10m
  resolver: ""
  fallback_resolvers:
    - "1.1.1.1:53"
    - "8.8.8.8:53"
  lookup_timeout: 3s
output:
  format: jsonl
  directory: ./reports
checkpoint:
  file: scan-state.json
cloudflare:
  enabled: false
  zones: []
  include: []
  exclude: []
  token_env: CLOUDFLARE_API_TOKEN
  timeout: 15s
  inventory_out: ""
  diff_against: ""
  delta_only: false
